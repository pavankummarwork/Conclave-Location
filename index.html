<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CONCLAVE DATE REVEAL</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:Consolas,monospace}
canvas{position:fixed;inset:0;z-index:0}
#boot{position:fixed;inset:0;background:#000;z-index:20;display:flex;align-items:center;justify-content:center;animation:fade 2.8s forwards 2s}
#line{width:0;height:2px;background:hsl(0, 72%, 50%);box-shadow:0 0 30px rgb(255, 0, 0);animation:line .8s forwards,expand .8s .8s forwards}
@keyframes line{to{width:100%}}
@keyframes expand{to{height:100%;width:100%}}
@keyframes fade{to{opacity:0;visibility:hidden}}
.scan{position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(to bottom,rgba(255,255,255,.03)0 1px,transparent 2px 4px);animation:scan 8s linear infinite;z-index:5}
@keyframes scan{from{transform:translateY(-100%)}to{transform:translateY(100%)}}
.wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:2}
.frame{width:min(1100px,92vw);
    aspect-ratio:16/9; max-height:80vh;border:2px solid #ff1500;box-shadow:0 0 20px #ff2600,0 0 80px rgba(255, 0, 0, 0.35);position:relative;overflow:hidden;background:#000;animation:vhs 5s infinite}
.frame:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,0,0,.05),transparent,rgba(0,255,255,.05));mix-blend-mode:screen;animation:rgb .08s infinite}
@keyframes rgb{50%{transform:translateX(2px)}}
@keyframes vhs{96%{transform:none}97%{transform:skewX(.8deg)}98%{transform:translateX(3px)}99%{transform:translateX(-3px)}}
video{width:100%;height:100%;object-fit:cover;filter:contrast(1.1) saturate(.9)}
.hud{position:absolute;inset:10px;border:1px solid rgba(255, 0, 0, 0.35);pointer-events:none}
.corner{position:absolute;width:28px;height:28px;border:2px solid rgb(255, 0, 0)}
.tl{left:0;top:0;border-right:0;border-bottom:0}.tr{right:0;top:0;border-left:0;border-bottom:0}.bl{left:0;bottom:0;border-right:0;border-top:0}.br{right:0;bottom:0;border-left:0;border-top:0}
.term{position:absolute;left:20px;top:20px;color:rgb(255, 0, 0);text-shadow:0 0 10px rgb(255, 0, 0);font-size:14px}
#playVideoBtn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);

    width:clamp(100px, 22%, 180px);
    aspect-ratio:16/9;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;

    background:rgba(0,0,0,.75);
    border:2px solid #ff1a1a;
    color:#ff1a1a;

    font-family:Consolas, monospace;
    font-size:clamp(12px, 1.2vw, 18px);

    cursor:pointer;
    z-index:100;

    box-shadow:0 0 15px #ff1a1a;
    transition:.25s;
}

#playVideoBtn svg{
    width:24px;
    height:24px;
    fill:currentColor;
}

#playVideoBtn:hover{
    background:#ff1a1a;
    color:#000;
    transform:translate(-50%,-50%) scale(1.05);
}

#playVideoBtn{
    width:20%;
    min-width:90px;
    max-width:160px;
    aspect-ratio:16/9;
}

</style>
</head>
<body>
<div id="boot"><div id="line"></div></div>
<canvas id="m"></canvas>
<div class="scan"></div>
<div class="wrap">
<div class="frame" id="frame">
<video id="bgVideo" loop playsinline>
    <source src="Conclave Location-1.mp4" type="video/mp4">
</video>

<button id="playVideoBtn">▶ START</button>
<div class="hud">
<div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
<div class="term" id="term"></div>
</div>
</div>
</div>
<script>
const c=document.getElementById("m"),x=c.getContext("2d");
function rs(){c.width=innerWidth;c.height=innerHeight}rs();onresize=rs;
const chars="01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&*アイウエオ";
const fs=16,cols=Math.floor(innerWidth/fs),drops=Array(cols).fill(1);
setInterval(()=>{
x.fillStyle="rgba(0,0,0,.08)";x.fillRect(0,0,c.width,c.height);
x.fillStyle="#ff1a1a";x.font=fs+"px monospace";
for(let i=0;i<drops.length;i++){
let t=chars[Math.floor(Math.random()*chars.length)];
x.fillText(t,i*fs,drops[i]*fs);
if(drops[i]*fs>c.height&&Math.random()>.975)drops[i]=0;
drops[i]++;
}},33);
const lines=[           
" "  
];
let i=0;
const term=document.getElementById("term");
const timer=setInterval(()=>{
if(i<lines.length){term.innerHTML+=lines[i]+"<br>";i++;}
else clearInterval(timer);
},700);
setInterval(()=>{
const f=document.getElementById("frame");
f.style.clipPath=`inset(${Math.random()*6}% 0 ${Math.random()*6}% 0)`;
setTimeout(()=>f.style.clipPath="none",90);
},3500);
const video = document.getElementById("bgVideo");
const playBtn = document.getElementById("playVideoBtn");

video.volume = 1;
video.muted = false;

playBtn.addEventListener("click", async () => {
    try {
        await video.play();
        playBtn.style.display = "none";
    } catch(err) {
        console.error(err);
    }
});

video.addEventListener("pause", () => {
    playBtn.style.display = "block";
});

video.addEventListener("ended", () => {
    playBtn.style.display = "block";
});
</script>
</body></html>
